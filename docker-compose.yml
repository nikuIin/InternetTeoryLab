services:
  wineshop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wineshop_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=wineshop;Username=postgres;Password=secret
    networks:
      - wineshop_net

  nginx:
    image: nginx:alpine
    container_name: wineshop_nginx
    restart: unless-stopped
    ports:
      - "5021:80"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wineshop
    networks:
      - wineshop_net

  db:
    image: postgres:16-alpine
    container_name: wineshop_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: wineshop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - wineshop_net

networks:
  wineshop_net:
    driver: bridge

volumes:
  pg_data:
